name: 'Generate GitHub App Token'
description: 'Generate an installation access token for the GitHub App'
inputs:
  app_id:
    description: 'GitHub App ID'
    required: true
  private_key:
    description: 'GitHub App Private Key'
    required: true
  installation_id:
    description: 'GitHub App Installation ID (optional, will auto-detect if not provided)'
    required: false
    default: ''
outputs:
  token:
    description: 'GitHub App installation access token'
    value: ${{ steps.generate-token.outputs.token }}
  token-expiry:
    description: 'Token expiry timestamp'
    value: ${{ steps.generate-token.outputs.token-expiry }}
runs:
  using: 'composite'
  steps:
    - name: Generate JWT
      id: generate-jwt
      shell: bash
      run: |
        set -e
        
        # Save private key to temporary file
        echo "${{ inputs.private_key }}" > /tmp/github-app-key.pem
        chmod 600 /tmp/github-app-key.pem
        
        # Generate JWT
        NOW=$(date +%s)
        EXP=$((NOW + 600))  # 10 minutes expiry
        
        HEADER='{"alg":"RS256","typ":"JWT"}'
        PAYLOAD="{\"iat\":$NOW,\"exp\":$EXP,\"iss\":\"${{ inputs.app_id }}\"}"
        
        HEADER_B64=$(echo -n "$HEADER" | base64 -w 0 | tr '+/' '-_' | tr -d '=')
        PAYLOAD_B64=$(echo -n "$PAYLOAD" | base64 -w 0 | tr '+/' '-_' | tr -d '=')
        
        MESSAGE="$HEADER_B64.$PAYLOAD_B64"
        SIGNATURE=$(echo -n "$MESSAGE" | openssl dgst -sha256 -sign /tmp/github-app-key.pem | base64 -w 0 | tr '+/' '-_' | tr -d '=')
        
        JWT="$MESSAGE.$SIGNATURE"
        
        # Clean up private key
        rm -f /tmp/github-app-key.pem
        
        echo "jwt=$JWT" >> $GITHUB_OUTPUT
        echo "::add-mask::$JWT"
    
    - name: Get Installation ID
      id: get-installation
      if: inputs.installation_id == ''
      shell: bash
      run: |
        set -e
        
        RESPONSE=$(curl -s -X GET \
          -H "Authorization: Bearer ${{ steps.generate-jwt.outputs.jwt }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/app/installations")
        
        INSTALL_ID=$(echo "$RESPONSE" | jq -r '.[0].id // empty')
        
        if [ -z "$INSTALL_ID" ]; then
          echo "::error::Failed to get installation ID"
          exit 1
        fi
        
        echo "installation_id=$INSTALL_ID" >> $GITHUB_OUTPUT
    
    - name: Generate Installation Token
      id: generate-token
      shell: bash
      run: |
        set -e
        
        # Use provided installation_id or the auto-detected one
        if [ -n "${{ inputs.installation_id }}" ]; then
          INSTALL_ID="${{ inputs.installation_id }}"
        else
          INSTALL_ID="${{ steps.get-installation.outputs.installation_id }}"
        fi
        
        echo "Using Installation ID: $INSTALL_ID"
        
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: Bearer ${{ steps.generate-jwt.outputs.jwt }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/app/installations/$INSTALL_ID/access_tokens" \
          -d '{
            "permissions": {
              "contents": "write",
              "pull_requests": "write",
              "workflows": "write",
              "issues": "write",
              "checks": "write",
              "actions": "write",
              "metadata": "read"
            }
          }')
        
        TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
        EXPIRY=$(echo "$RESPONSE" | jq -r '.expires_at // empty')
        
        if [ -z "$TOKEN" ]; then
          echo "::error::Failed to generate installation token"
          echo "Response: $RESPONSE"
          exit 1
        fi
        
        echo "token=$TOKEN" >> $GITHUB_OUTPUT
        echo "token-expiry=$EXPIRY" >> $GITHUB_OUTPUT
        echo "::add-mask::$TOKEN"
        echo "✅ Generated token (expires: $EXPIRY)"
