name: Auto PR Validator

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: write
  workflows: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Generate GitHub App Token (if configured)
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          installation_id: ${{ secrets.GH_APP_INSTALLATION_ID }}
        continue-on-error: true

      - name: Set token for workflow
        id: set-token
        run: |
          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "Using GitHub App token"
            echo "token=${{ steps.app-token.outputs.token }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.GIT_PAT }}" ]; then
            echo "Using GIT_PAT"
            echo "token=${{ secrets.GIT_PAT }}" >> $GITHUB_OUTPUT
          else
            echo "Using github.token"
            echo "token=${{ github.token }}" >> $GITHUB_OUTPUT
          fi

      - name: Check kill-switch
        id: killswitch
        run: |
          echo "Checking kill-switch status..."
          if [ -f "_OPS/SAFETY/KILL_SWITCH" ]; then
            if grep -iq "DISABLE_AUTONOMY" "_OPS/SAFETY/KILL_SWITCH"; then
              echo "❌ Kill-switch activated: DISABLE_AUTONOMY found"
              echo "kill_switch_active=true" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          if [ -f "_OPS/SAFETY/KILL_SWITCH.json" ]; then
            if grep -iq "DISABLE_AUTONOMY" "_OPS/SAFETY/KILL_SWITCH.json"; then
              echo "❌ Kill-switch activated: DISABLE_AUTONOMY found"
              echo "kill_switch_active=true" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          echo "✅ Kill-switch check passed"
          echo "kill_switch_active=false" >> $GITHUB_OUTPUT

      - name: Verify rehydrate tag
        id: rehydrate
        run: |
          echo "Verifying rehydrate tag qxb-phase5-lock-2026-02-06..."
          if git rev-parse qxb-phase5-lock-2026-02-06 >/dev/null 2>&1; then
            HASH=$(git rev-parse qxb-phase5-lock-2026-02-06)
            echo "✅ Tag found: $HASH"
            echo "$HASH" > .rehydrate_hash
            echo "rehydrate_hash=$HASH" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Tag qxb-phase5-lock-2026-02-06 not found - proceeding without rehydrate check"
            echo "none" > .rehydrate_hash
            echo "rehydrate_hash=none" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            echo "Installing root dependencies..."
            npm ci || npm install
          fi
          
          # Install in subdirectories with package.json
          for dir in frontend backend website; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing dependencies in $dir..."
              cd "$dir"
              npm ci || npm install
              cd ..
            fi
          done

      - name: Auto-fix issues
        id: autofix
        run: |
          echo "Running auto-fix script..."
          bash scripts/push-fixes.sh || echo "No fixes needed or script not executable"
          
          # Check if there are changes
          if ! git diff --quiet; then
            echo "changes_made=true" >> $GITHUB_OUTPUT
            echo "✅ Auto-fixes applied"
          else
            echo "changes_made=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No auto-fixes needed"
          fi

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          mkdir -p test-results
          
          # Run tests if test script exists
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            echo "Running tests..."
            npm test 2>&1 | tee test-results/test-output.log || true
          else
            echo "No tests configured at root level"
            echo "ok 1 - No tests configured" > test-results/results.tap
          fi
          
          # Check for TAP output
          if [ ! -f "test-results/results.tap" ]; then
            echo "# TAP output not found, creating minimal TAP"
            echo "TAP version 13" > test-results/results.tap
            echo "1..1" >> test-results/results.tap
            echo "ok 1 - Test run completed" >> test-results/results.tap
          fi

      - name: Parse TAP results
        id: tap_parse
        run: |
          echo "Parsing TAP results..."
          if [ -f "scripts/tap-parse.js" ]; then
            node scripts/tap-parse.js test-results/results.tap > test-results/summary.json || echo '{"status":"unknown","total":0,"passed":0,"failed":0}' > test-results/summary.json
          else
            echo '{"status":"no_parser","total":0,"passed":0,"failed":0,"message":"TAP parser not found"}' > test-results/summary.json
          fi
          
          # Output summary
          cat test-results/summary.json

      - name: Append audit evidence
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ROLLBACK_TOKEN="qxb-rollback-${TIMESTAMP}"
          
          mkdir -p _OPS/OUTPUT _OPS/AUDIT
          
          # Create audit entry
          cat >> _OPS/AUDIT/audit.log <<EOF
--- Audit Entry: $TIMESTAMP ---
          Workflow: autopr-validator
          PR: ${{ github.event.pull_request.number }}
          Commit: ${{ github.sha }}
          Rollback Token: $ROLLBACK_TOKEN
          Rehydrate Hash: ${{ steps.rehydrate.outputs.rehydrate_hash }}
          Auto-fixes Applied: ${{ steps.autofix.outputs.changes_made }}
          Kill-switch Status: ${{ steps.killswitch.outputs.kill_switch_active }}
          Test Summary: $(cat test-results/summary.json 2>/dev/null || echo "N/A")
          ---
          EOF
          
          # Create output evidence
          cat > _OPS/OUTPUT/pr-${{ github.event.pull_request.number }}-${TIMESTAMP}.json <<EOF
          {
            "timestamp": "$TIMESTAMP",
            "rollback_token": "$ROLLBACK_TOKEN",
            "pr_number": "${{ github.event.pull_request.number }}",
            "commit_sha": "${{ github.sha }}",
            "workflow": "autopr-validator",
            "rehydrate_hash": "${{ steps.rehydrate.outputs.rehydrate_hash }}",
            "auto_fixes_applied": "${{ steps.autofix.outputs.changes_made }}",
            "kill_switch_active": "${{ steps.killswitch.outputs.kill_switch_active }}"
          }
          EOF
          
          echo "✅ Audit evidence appended"

      - name: Commit audit evidence
        if: steps.autofix.outputs.changes_made == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ROLLBACK_TOKEN="qxb-rollback-${TIMESTAMP}"
          
          git config user.name "qxb-bot"
          git config user.email "bot@infinityxonesystems.com"
          git add _OPS/AUDIT/audit.log _OPS/OUTPUT/ test-results/
          git commit -m "audit: PR validation evidence ${ROLLBACK_TOKEN}" || echo "No audit changes to commit"
          git push origin HEAD || echo "Failed to push audit evidence"

      - name: Auto-approve PR
        if: |
          github.event.pull_request.user.login == 'github-actions[bot]' ||
          github.event.pull_request.user.login == 'copilot' ||
          contains(github.event.pull_request.labels.*.name, 'auto-approve-safe')
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ steps.set-token.outputs.token }}

      - name: Check for auto-merge label
        if: contains(github.event.pull_request.labels.*.name, 'automerge-approved')
        run: |
          echo "✅ PR has automerge-approved label"
          echo "Auto-merge will be handled by GitHub merge queue or auto-merge settings"

      - name: Summary
        if: always()
        run: |
          echo "### 🤖 Auto PR Validator Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Kill-switch**: ${{ steps.killswitch.outputs.kill_switch_active == 'false' && '✅ Not Active' || '❌ Active (Autonomy Disabled)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Rehydrate Hash**: ${{ steps.rehydrate.outputs.rehydrate_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auto-fixes**: ${{ steps.autofix.outputs.changes_made == 'true' && '✅ Applied' || 'None needed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: $(cat test-results/summary.json 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 Audit evidence appended to _OPS/AUDIT/audit.log" >> $GITHUB_STEP_SUMMARY
