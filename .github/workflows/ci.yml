name: Quantum-X CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: |
          if (Test-Path "backend/package.json") {
            Push-Location backend
            
            Write-Host "📦 Attempting strict install with npm ci..."
            
            # Try npm ci first (strict install)
            $ciOutput = npm ci 2>&1 | Tee-Object -Variable ciResult
            $ciExitCode = $LASTEXITCODE
            
            if ($ciExitCode -eq 0) {
              Write-Host "✅ npm ci succeeded - dependencies installed" -ForegroundColor Green
            } else {
              Write-Host "⚠️ npm ci failed - lock file may be out of sync" -ForegroundColor Yellow
              Write-Host "::warning::backend/package-lock.json is out of sync with package.json. Running npm install as fallback."
              
              Write-Host "`n📦 Falling back to npm install..."
              npm install
              $installExitCode = $LASTEXITCODE
              
              if ($installExitCode -eq 0) {
                Write-Host "✅ npm install succeeded" -ForegroundColor Green
                Write-Host "⚠️ WARNING: Lock file was regenerated. Please commit the updated package-lock.json." -ForegroundColor Yellow
              } else {
                Write-Host "❌ npm install also failed" -ForegroundColor Red
                Pop-Location
                exit $installExitCode
              }
            }
            
            Pop-Location
          } else {
            Write-Host "No backend/package.json found"
          }

      - name: Run Tests
        run: |
          if (Test-Path "tests") {
            node --test tests
          } else {
            Write-Host "No tests directory found"
          }

      - name: Schema Validation
        run: |
          if (-not (Test-Path "schemas/system.schema.json")) {
            throw "SYSTEM SCHEMA MISSING — BLOCKING"
          }
          Write-Host "System schema present"

      - name: Evidence Capture
        run: |
          New-Item -ItemType Directory -Force -Path "_evidence" | Out-Null
          @{
            run_timestamp = (Get-Date -Format o)
            job           = "Quantum-X CI"
            status        = "OK"
          } | ConvertTo-Json -Depth 5 |
            Out-File "_evidence/ci.json" -Encoding utf8
