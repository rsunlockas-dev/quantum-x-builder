name: Documentation Preview for Pull Requests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/docs-preview.yml'

jobs:
  build-preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build website
        run: npm run build
        env:
          # Use environment variables for preview builds
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-${{ github.event.pull_request.number }}
          path: website/build
          retention-days: 30
          
      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comment = `## 📚 Documentation Preview
            
            The documentation build has completed successfully for this PR.
            
            **Build Details:**
            - PR Number: #${prNumber}
            - Commit: ${context.sha.substring(0, 7)}
            - Build artifact: \`docs-preview-${prNumber}\`
            
            ### Local Preview
            
            To preview the changes locally:
            
            1. Download the build artifact from this workflow run
            2. Extract the files
            3. Serve with any static file server:
               \`\`\`bash
               npx serve build
               \`\`\`
            
            ### Testing Checklist
            
            - [ ] All links work correctly
            - [ ] Search functionality works
            - [ ] Navigation is intuitive
            - [ ] Content is accurate
            - [ ] No broken images
            - [ ] Responsive on mobile
            
            ---
            
            *Note: GitHub Pages preview requires additional setup. See [Deploying PR Previews](https://docusaurus.io/docs/deployment#deploying-to-github-pages) for options.*`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
  lint-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run typecheck
        
      - name: Check for broken links
        run: npm run build
        continue-on-error: true
        
      - name: Report results
        if: always()
        run: |
          echo "Documentation build and checks completed"
          echo "Review the logs above for any warnings or errors"
