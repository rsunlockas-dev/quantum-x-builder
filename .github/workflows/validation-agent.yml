name: "Validation Agent"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate'
        required: false
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 * * * *'  # Every hour (rate-limit friendly)

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm ci || npm install || true
        fi
      continue-on-error: true

    - name: Run Validation Agent
      id: validate
      run: node .github/agents/validator-agent.js
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      continue-on-error: true

    - name: Post Validation Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = '.github/agents/validation-report.json';
          
          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            
            let body = '## 🤖 Validation Report\n\n';
            body += `**Status:** ${report.approved ? '✅ Passed' : '❌ Failed'}\n`;
            body += `**Timestamp:** ${report.timestamp}\n\n`;
            body += '### Results\n\n';
            
            for (const [check, result] of Object.entries(report.results)) {
              const status = result.passed ? '✅' : '❌';
              const skipped = result.skipped ? '(skipped)' : '';
              body += `- ${status} **${check}** ${skipped}\n`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }
