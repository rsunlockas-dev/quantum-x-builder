version: '3.8'

# Local development overrides
# This file is automatically applied by docker-compose and allows local customization
# without modifying the main docker-compose.yml

services:
  backend:
    # Add debug port for remote debugging
    ports:
      - "9229:9229"
    environment:
      - DEBUG=false
      - LOG_LEVEL=debug
      - NODE_OPTIONS="--inspect=0.0.0.0:9229"
    volumes:
      - ./backend/src:/workspace/backend/src

  frontend:
    environment:
      - DEBUG=false
      - VITE_DEBUG=false
    volumes:
      - ./frontend/src:/workspace/frontend/src

  # Optional: Add Redis for caching (uncomment to use)
