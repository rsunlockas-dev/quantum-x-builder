version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_ENV: production
    container_name: qxb-backend-prod
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - WORKSPACE_ROOT=/workspace
      - PORT=8787
    networks:
      - qxb-network
    volumes:
      - workspace-data:/workspace
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NODE_ENV: production
    container_name: qxb-frontend-prod
    restart: unless-stopped
    env_file:
      - frontend/.env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://backend:8787
      - VITE_AGENT_URL=http://backend:8787
      - VITE_WS_URL=ws://gateway:8090
    networks:
      - qxb-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    image: nats:2.10-alpine
    container_name: qxb-nats-prod
    restart: unless-stopped
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - qxb-network
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/varz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build:
      context: .
      dockerfile: services/qxb-chat-gateway/Dockerfile
    container_name: qxb-gateway-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - PORT=8090
    ports:
      - "8090:8090"
    networks:
      - qxb-network
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Microservices (optional - can be enabled as needed)
  narrator:
    build:
      context: .
      dockerfile: services/qxb-narrator/Dockerfile
    container_name: qxb-narrator-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - PORT=3001
    networks:
      - qxb-network
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    profiles:
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  presence:
    build:
      context: .
      dockerfile: services/qxb-presence/Dockerfile
    container_name: qxb-presence-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - PORT=3002
    networks:
      - qxb-network
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    profiles:
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  proposal-engine:
    build:
      context: .
      dockerfile: services/proposal-engine/Dockerfile
    container_name: qxb-proposal-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - PORT=3003
    networks:
      - qxb-network
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    profiles:
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  pubsub:
    build:
      context: .
      dockerfile: services/qxb-pubsub/Dockerfile
    container_name: qxb-pubsub-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - PORT=3004
    networks:
      - qxb-network
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    profiles:
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  qxb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  workspace-data:
    driver: local
  backend-logs:
    driver: local
  nats-data:
    driver: local
