version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vizualx-backend
    env_file:
      - backend/.env
    ports:
      - '8787:8787'
    volumes:
      - ./:/workspace
    environment:
      - WORKSPACE_ROOT=/workspace
    networks:
      - vizualx

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vizualx-frontend
    env_file:
      - frontend/.env
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://backend:8787
      - VITE_AGENT_URL=http://backend:8787
    networks:
      - vizualx
    depends_on:
      - backend

  nats:
    image: nats:2.10-alpine
    container_name: qxb-nats
    command: ['-js', '-m', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    networks:
      - vizualx

networks:
  vizualx:
    driver: bridge
