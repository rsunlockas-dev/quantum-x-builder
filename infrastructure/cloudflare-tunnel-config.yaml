# ============================================================================
# Cloudflare Tunnel Configuration
# vizual-x.com - Zero Trust Network Access
# ============================================================================
#
# This configuration enables authenticated tunnel access to Vizual-X services
# through Cloudflare's Zero Trust platform.
#
# Installation:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   2. Authenticate: cloudflared tunnel login
#   3. Create tunnel: cloudflared tunnel create vizual-x-production
#   4. Route traffic: cloudflared tunnel route dns vizual-x.com
#   5. Update this config with your credentials file location
#   6. Run: cloudflared tunnel run vizual-x-production --config config.yaml
#

# Tunnel configuration
tunnel: vizual-x-production
credentials-file: /path/to/credentials.json # Replace with actual path
logfile: /var/log/cloudflared/tunnel.log
loglevel: info

# Ingress rules - route traffic to services
ingress:
  # Frontend routes
  - hostname: vizual-x.com
    service: http://localhost:3000
    originRequest:
      httpHostHeader: vizual-x.com
      connectTimeout: 30s
      tlsTimeout: 30s
      tcpKeepAlive: 30s
      noTLSVerify: false
      disableChunkedEncoding: false

  - hostname: www.vizual-x.com
    service: http://localhost:3000
    originRequest:
      httpHostHeader: www.vizual-x.com

  # API routes (protected by IAP)
  - hostname: api.vizual-x.com
    service: http://localhost:8787
    originRequest:
      httpHostHeader: api.vizual-x.com
      connectTimeout: 60s
      tlsTimeout: 60s
      tcpKeepAlive: 30s
      # Add custom headers for internal authentication
      headers:
        X-Forwarded-Proto: https
        X-Real-IP: true
        X-Forwarded-For: true

  # Agent routes (protected by IAP)
  - hostname: agent.vizual-x.com
    service: http://localhost:8787
    originRequest:
      httpHostHeader: agent.vizual-x.com
      connectTimeout: 60s
      tlsTimeout: 60s
      tcpKeepAlive: 30s
      headers:
        X-Forwarded-Proto: https
        X-Real-IP: true
        X-Forwarded-For: true

  # Health check endpoint
  - hostname: health.vizual-x.com
    service: http://localhost:3000/health

  # Metrics endpoint (internal only)
  - hostname: metrics.vizual-x.com
    service: http://localhost:8787/metrics
    originRequest:
      connectTimeout: 30s

  # Default catch-all (return 404)
  - service: http_status:404

# Tunnel configuration
originRequest:
  connectTimeout: 30s
  tlsTimeout: 30s
  tcpKeepAlive: 30s
  noTLSVerify: false
  disableChunkedEncoding: false

# Connection pool configuration
proxy-service-monitor:
  enabled: true

# Health check configuration
features:
  - protocol: http2
  - ipv6: true
  - gracefulShutdown: true

# Metrics and diagnostics
metrics:
  enabled: true
  address: '127.0.0.1:7834'
  readTimeout: 30s
  writeTimeout: 30s

# Advanced settings
max-fetch-size: 4294967296 # 4GB max request/response size
keep-alive-connections: 32
keep-alive-timeout: 30s

# TLS settings for tunnel connections
tls:
  enabled: true
  insecureSkipVerify: false
  clientauth:
    enabled: false

# Error reporting
reporting:
  enabled: true
  captureErrorResponse: true

---
# DNS routing configuration (apply in Cloudflare dashboard)
#
# Create CNAME records pointing to your tunnel:
#
# Name: vizual-x.com
# Type: CNAME
# Content: <tunnel-id>.cfargotunnel.com
# Proxy status: Proxied
#
# Name: www
# Type: CNAME
# Content: <tunnel-id>.cfargotunnel.com
# Proxy status: Proxied
#
# Name: api
# Type: CNAME
# Content: <tunnel-id>.cfargotunnel.com
# Proxy status: Proxied
#
# Name: agent
# Type: CNAME
# Content: <tunnel-id>.cfargotunnel.com
# Proxy status: Proxied
#
# Name: health
# Type: CNAME
# Content: <tunnel-id>.cfargotunnel.com
# Proxy status: Proxied

---
# Access Policy Configuration
#
# In Cloudflare Zero Trust > Applications:
#
# Application 1: API Gateway
#   Domain: api.vizual-x.com
#   Auth Type: OAuth 2.0 (Google)
#   MFA Required: Yes
#   Allowed Users: your-team@vizual-x.com
#   Session Duration: 8 hours
#
# Application 2: Agent Management
#   Domain: agent.vizual-x.com
#   Auth Type: Service Account (OAuth 2.0 + mutual TLS)
#   MFA Required: Yes
#   Allowed Users: agent-admins@vizual-x.com
#   Session Duration: 24 hours
#
# Application 3: Frontend (Public)
#   Domain: vizual-x.com
#   Auth Type: None (public access)
#   Cache: Enabled (TTL: 3600)
#   Bot Management: Enabled
